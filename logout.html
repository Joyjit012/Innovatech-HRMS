<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Successfully Logged Out - Innovatetech.HRMS</title>
  <link rel="stylesheet" href="logout.css">
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Decorative Background Elements -->
  <div class="bg-circle bg-top-right"></div>
  <div class="bg-circle bg-bottom-left"></div>

  <div class="container">
    <!-- Header Logo -->
    <header class="logo">
      Innovatetech<span>.HRMS</span>
    </header>

    <!-- Main Card -->
    <main class="card">
      
      <!-- Success Icon Area -->
      <div class="icon-container">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
        <div class="dot dot-4"></div>
        <svg class="sparkle sparkle-1" viewBox="0 0 24 24"><path d="M12 0l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/></svg>
        <svg class="sparkle sparkle-2" viewBox="0 0 24 24"><path d="M12 0l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/></svg>
        
        <div class="success-circle">
          <svg class="checkmark" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
      </div>

      <!-- Content -->
      <h1 class="title">Successfully Logged Out!</h1>
      <p class="description">
        You have been logged out of your account.<br>
        Thank you for using <span class="brand-text">Innovatetech.HRMS</span>.
      </p>

      <!-- Security Notice -->
      <div class="security-notice">
        <div class="shield-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <rect x="9" y="11" width="6" height="5" rx="1" fill="currentColor"/>
          </svg>
        </div>
        <p class="notice-text">
          For your security, please close your browser if you're on a shared device.
        </p>
      </div>

      <!-- Action Buttons -->
      <div class="button-group">
        <a href="#" class="btn btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Login Again
        </a>
        <a href="#" class="btn btn-secondary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Go to Home
        </a>
      </div>

    </main>
  </div>

  <!-- Decorative Grid Dots -->
  <div class="grid-dots dots-top-left"></div>
  <div class="grid-dots dots-bottom-right"></div>

</body>
</html>
